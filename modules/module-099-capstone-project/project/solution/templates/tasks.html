{% extends "base.html" %}

{% block title %}{% if task %}Edit Task{% else %}New Task{% endif %} - Task Manager{% endblock %}

{% block content %}
<h1>{% if task %}Edit Task{% else %}New Task{% endif %}</h1>

<div class="card">
    <form method="post" action="{% if task %}/tasks/{{ task.id }}/edit{% else %}/tasks/new{% endif %}">
        <label for="title">Title *</label>
        <input type="text" id="title" name="title" value="{{ task.title if task else '' }}" required maxlength="200">

        <label for="description">Description</label>
        <textarea id="description" name="description">{{ task.description if task else '' }}</textarea>

        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="pending" {% if task and task.status.value == 'pending' %}selected{% endif %}>Pending</option>
            <option value="in_progress" {% if task and task.status.value == 'in_progress' %}selected{% endif %}>In Progress</option>
            <option value="completed" {% if task and task.status.value == 'completed' %}selected{% endif %}>Completed</option>
        </select>

        <label for="priority">Priority (1-5)</label>
        <input type="number" id="priority" name="priority" value="{{ task.priority if task else 3 }}" min="1" max="5">

        <label for="category_id">Category</label>
        <select id="category_id" name="category_id">
            <option value="">None</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if task and task.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>

        <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/" class="btn" style="background: #95a5a6; color: white;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
